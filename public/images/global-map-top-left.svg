<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="gmGlobe" cx="62%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#121a28" stop-opacity="1"/>
      <stop offset="45%" stop-color="#0a0e16" stop-opacity="1"/>
      <stop offset="100%" stop-color="#040508" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="gmKoreaHub" cx="61.8%" cy="36.8%" r="18%">
      <stop offset="0%" stop-color="#e8d5b4" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#c9a66a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a66a" stop-opacity="0"/>
    </radialGradient>
    <filter id="gmGlowSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gmGlowLine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gmRouteDEKR" x1="14%" y1="21%" x2="62%" y2="37%">
      <stop offset="0%" stop-color="#f0e4cf" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#d8c1a0" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c9a66a" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="gmRouteAsia" x1="62%" y1="37%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#e8d5b4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d8c1a0" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#gmGlobe)"/>
  <rect width="1920" height="1080" fill="url(#gmKoreaHub)" opacity="0.9"/>
  <!-- 대륙 윤곽: 낮은 대비, 네이비 톤에서 살짝 띄움 -->
  <g opacity="0.38" stroke="#8a9ab0" stroke-width="0.85" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 180 320 Q 280 280 400 300 T 620 340 Q 720 360 780 400"/>
    <path d="M 240 200 Q 320 160 420 180 Q 500 200 520 260 Q 480 300 400 320 Q 300 300 240 200"/>
    <path d="M 880 280 Q 1020 240 1180 280 Q 1320 320 1420 400 Q 1380 480 1240 520 Q 1080 500 920 440 Q 860 360 880 280"/>
    <path d="M 1000 480 Q 1120 460 1240 500 Q 1180 580 1040 600 Q 920 560 1000 480"/>
  </g>
  <!-- DE ↔ KR 주 루트 (글로우 밑깔 + 본선) -->
  <path d="M 268 228 C 420 195 520 305 1188 398" stroke="#d8c1a0" stroke-opacity="0.35" stroke-width="5" stroke-linecap="round" filter="url(#gmGlowLine)"/>
  <path d="M 268 228 C 420 195 520 305 1188 398" stroke="url(#gmRouteDEKR)" stroke-width="1.35" stroke-linecap="round" filter="url(#gmGlowSoft)"/>
