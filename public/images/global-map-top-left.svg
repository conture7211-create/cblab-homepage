  <circle cx="268" cy="228" r="4.5" fill="#f2e8d8" fill-opacity="0.85"/>
  <circle cx="268" cy="228" r="14" stroke="#d8c1a0" stroke-opacity="0.35" stroke-width="0.55"/>
