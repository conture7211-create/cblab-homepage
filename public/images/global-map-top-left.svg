  <circle cx="1188" cy="398" r="22" fill="#d8c1a0" fill-opacity="0.12" filter="url(#gmGlowLine)"/>
  <circle cx="1188" cy="398" r="12" fill="#d8c1a0" fill-opacity="0.45" filter="url(#gmGlowSoft)"/>
