    <text x="1068" y="478" fill="#e8dfd0" stroke="#0a0e16" stroke-width="0.35" paint-order="stroke fill">VIETNAM</text>
    <text x="1018" y="548" fill="#e8dfd0" stroke="#0a0e16" stroke-width="0.35" paint-order="stroke fill">SINGAPORE</text>
  </g>
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="9" letter-spacing="0.08em" fill="#c9b8a0" opacity="0.92">
